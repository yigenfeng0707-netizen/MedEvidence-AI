name: medevidence-ai
display_name: 医学循证检索助手
description: 基于KnowS医学循证API的智能检索工具，支持PubMed文献检索、循证分级和智能摘要生成
icon: 
version: 1.0.0
author: yigenfeng0707-netizen
license: Apache-2.0
category: medical
tags:
  - 医疗
  - 医学文献
  - 循证医学
  - PubMed
  - 文献检索

source:
  type: local
  
runtime:
  command: python src/main.py
  python_version: "3.11"
  port: 8000
  
environment_variables:
  - name: KNOWS_API_KEY
    value: sk-knows-aWsL8pr0PkN88F9JlqUWzKYuwkxFw5mi
  - name: STEPFUN_API_KEY
    value: 2XDrgYOtH3z0nnv1LoYQXD6AowAwCPwY1rZuMw6AWZES1mej4SH9MElA5wvHa4zKJ
  - name: STEPFUN_MODEL
    value: step-1-flash
  - name: STEPFUN_API_BASE
    value: https://api.stepfun.com/v1
  - name: KNOWS_API_BASE
    value: https://api.nullht.com/v1
  - name: PORT
    value: "8000"
  - name: DEBUG
    value: "false"
  - name: CACHE_ENABLED
    value: "true"
  - name: CACHE_TTL
    value: "3600"
  - name: LOG_LEVEL
    value: INFO

health_check:
  path: /health
  method: GET

endpoints:
  - path: /api/v1/search
    method: POST
    description: 医学文献检索
  - path: /api/v1/search/quick
    method: POST
    description: 快速检索

resources:
  cpu: "2"
  memory: "4Gi"
